# Workflow: Build, Test & Publish to npm
# Triggered when a GitHub Release is published (draft → published).
# Flow: checkout → install → test → build → attach bundle → publish to npm
#
# Requires NPM_TOKEN secret (Granular Access Token with read/write on the package).

name: Build and Publish

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install Dependencies
        run: npm ci

      - name: Run Tests
        run: npm test

      - name: Build and Bundle
        run: |
          npm run build
          VERSION=${{ github.event.release.tag_name }}
          VERSION_CLEAN=${VERSION#v}
          BUNDLE_NAME="docstream.browser@$VERSION_CLEAN.js"
          cp dist/officeparser.browser.js "dist/$BUNDLE_NAME"
          echo "BUNDLE_NAME=$BUNDLE_NAME" >> $GITHUB_ENV

      - name: Upload Bundle as Release Asset
        run: gh release upload "${{ github.event.release.tag_name }}" "dist/${{ env.BUNDLE_NAME }}" --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
