# Workflow: Create Draft Release
# Monitors pushes to master for package.json version changes.
# If version bumped, creates a Draft Release on GitHub.
# Publishing that draft triggers the build-and-publish workflow.

name: Create Draft Release

on:
  push:
    branches:
      - master
    paths:
      - "package.json"

permissions:
  contents: write

jobs:
  version-check-and-release:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get Package Version and Latest Tag
        id: version
        run: |
          NEW_VERSION=$(jq -r '.version' package.json)
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT

          LAST_TAG=$(git tag -l "v*" --sort=-v:refname | head -n 1)
          LAST_VERSION=${LAST_TAG#v}
          echo "last_version=${LAST_VERSION:-0.0.0}" >> $GITHUB_OUTPUT

          echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT
        shell: bash

      - name: Create Draft GitHub Release
        if: steps.version.outputs.new_version != steps.version.outputs.last_version
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.new_version }}
          name: "v${{ steps.version.outputs.new_version }}"
          body: |
            # v${{ steps.version.outputs.new_version }} — ${{ steps.version.outputs.date }}

            ## Changes
            [v${{ steps.version.outputs.last_version }}...v${{ steps.version.outputs.new_version }}](https://github.com/${{ github.repository }}/compare/v${{ steps.version.outputs.last_version }}...v${{ steps.version.outputs.new_version }})

            ## What's New
            <!-- Edit this section before publishing the release -->

          draft: true
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
